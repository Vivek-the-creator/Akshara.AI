<!DOCTYPE html>
<html>
<head>
    <title>API Connection Test</title>
</head>
<body>
    <h1>API Connection Test</h1>
    <div id="results"></div>
    
    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            
            try {
                console.log('Testing API connection...');
                
                // Test 1: Health check
                console.log('1. Testing health endpoint...');
                const healthResponse = await fetch('/api/health');
                const healthData = await healthResponse.json();
                console.log('Health check:', healthData);
                
                // Test 2: Progress endpoint (without auth)
                console.log('2. Testing progress endpoint...');
                const progressResponse = await fetch('/api/progress/user?stage=beginner&category=uyir-ezhuthugal');
                console.log('Progress response status:', progressResponse.status);
                
                if (progressResponse.status === 401) {
                    results.innerHTML = '<p style="color: green">✅ API is working correctly! Got expected 401 (unauthorized) response.</p>';
                } else if (progressResponse.ok) {
                    const progressData = await progressResponse.json();
                    results.innerHTML = `<p style="color: green">✅ API working! Progress data: ${JSON.stringify(progressData)}</p>`;
                } else {
                    results.innerHTML = `<p style="color: orange">⚠️ API responded with status: ${progressResponse.status}</p>`;
                }
                
            } catch (error) {
                console.error('API test error:', error);
                results.innerHTML = `<p style="color: red">❌ API Error: ${error.message}</p>`;
            }
        }
        
        // Run test when page loads
        window.onload = testAPI;
    </script>
</body>
</html>
