<!DOCTYPE html>
<html>
<head>
    <title>Progress Debug Test</title>
</head>
<body>
    <h1>Progress System Debug</h1>
    <div id="results"></div>
    
    <script>
        // Test the progress saving and loading
        async function testProgress() {
            const results = document.getElementById('results');
            
            try {
                // Test 1: Check current user
                console.log('=== Testing Progress System ===');
                
                // Test 2: Save a test progress record
                const testProgress = {
                    user_id: 'test-user-123',
                    language: 'Tamil',
                    stage: 'beginner',
                    category: 'uyir-ezhuthugal',
                    level_number: 1,
                    expected_character: 'அ',
                    attempts_count: 2,
                    stars_awarded: 3,
                    completed_at: new Date().toISOString()
                };
                
                console.log('Test progress data:', testProgress);
                
                // Test 3: Try to load progress
                const response = await fetch('/api/progress/user?stage=Beginner&category=Uyir%20Ezhuthugal', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        // Add auth token if needed
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Progress data loaded:', data);
                    results.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    console.error('Failed to load progress:', response.status);
                    results.innerHTML = `Error: ${response.status} - ${response.statusText}`;
                }
                
            } catch (error) {
                console.error('Test error:', error);
                results.innerHTML = `Error: ${error.message}`;
            }
        }
        
        // Run test when page loads
        window.onload = testProgress;
    </script>
</body>
</html>
